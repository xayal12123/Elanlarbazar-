<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Pro | Elan və İcma Platforması</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        /* Sürüşdürmə çubuğunu gizlətmək üçün (No-scrollbar) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Ümumi font və təmizləmə */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f7fa;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Şəkillərin yüklənmə effekti */
        img {
            transition: opacity 0.3s ease-in-out;
        }
        
        /* Mobil optimizasiya */
        input, select, textarea {
            font-size: 16px !important; /* Zoom-un qarşısını almaq üçün */
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script src="./katalok.js"></script>

    <script type="text/babel" src="./app.js"></script>

</body>
</html>
