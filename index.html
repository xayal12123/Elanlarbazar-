<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elanbazarı NOIR</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/systemjs@6.14.1/dist/system.min.js"></script>
</head>
<body class="bg-black text-white">
  
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #16a34a; font-family: monospace; letter-spacing: 2px;">
      [ SİSTEM BAŞLADILIR... ]
    </div>
  </div>

  <script type="text/babel" data-type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    // Bütün sistemin idarə olunduğu ana fayl
    import App from './uygulama.js';

    try {
      const container = document.getElementById('root');
      const root = createRoot(container);
      root.render(<App />);
    } catch (error) {
      document.getElementById('root').innerHTML = `
        <div style="color: red; padding: 20px; font-family: monospace;">
          Kritik Xəta: ${error.message}
        </div>
      `;
      console.error(error);
    }
  </script>

</body>
</html>
